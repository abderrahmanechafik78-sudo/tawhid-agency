<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Tawhid Agency — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#f8faff;--bg2:#f0f4ff;--bg3:#ffffff;--blue:#185fa5;--blue2:#2472c8;--blue3:rgba(24,95,165,.08);--green:#0f6e56;--green2:#1a9a7a;--gold:#b07d10;--red:#a32d2d;--cream:#0a0f1e;--text:#5a6a8a;--muted:#8899cc;--border:rgba(24,95,165,.12);--border2:rgba(24,95,165,.22);--fs:'Syne',sans-serif;--fb:'Inter',sans-serif;--fm:'JetBrains Mono',monospace}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--fb);font-weight:300;min-height:100vh}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--blue);border-radius:2px}
#login{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:999}
.login-box{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:3rem;width:100%;max-width:380px;position:relative;overflow:hidden}
.login-box::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--blue),var(--green))}
.login-logo{font-family:var(--fs);font-size:1.8rem;font-weight:800;color:var(--cream);margin-bottom:.2rem}
.login-logo span{color:var(--green)}
.login-sub{font-size:.62rem;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);font-family:var(--fm);margin-bottom:2.5rem}
.lf label{display:block;font-size:.58rem;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin-bottom:.4rem;font-family:var(--fm)}
.lf input{width:100%;background:rgba(79,142,247,.06);border:1px solid rgba(79,142,247,.15);padding:.82rem 1rem;color:var(--cream);font-size:.85rem;outline:none;border-radius:6px;font-family:var(--fb);margin-bottom:1rem;transition:border-color .2s}
.lf input:focus{border-color:rgba(79,142,247,.5)}
.lf button{width:100%;background:linear-gradient(135deg,var(--green),var(--green2));color:#04060f;border:none;padding:.9rem;font-size:.7rem;letter-spacing:.15em;text-transform:uppercase;font-weight:700;font-family:var(--fs);border-radius:6px;cursor:pointer;transition:all .3s}
.lf button:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(34,209,122,.3)}
.login-err{font-size:.75rem;color:var(--red);margin-bottom:.8rem;display:none;padding:.6rem;background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.2);border-radius:4px}
#app{display:none;min-height:100vh}
.sidebar{position:fixed;left:0;top:0;bottom:0;width:230px;background:#ffffff;border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:100}
.sb-logo{padding:1.5rem;border-bottom:1px solid var(--border)}
.sb-logo-main{font-family:var(--fs);font-size:1.1rem;font-weight:800;color:var(--cream)}
.sb-logo-main span{color:var(--green)}
.sb-logo-sub{font-size:.52rem;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);font-family:var(--fm)}
.sb-nav{flex:1;padding:1rem 0}
.sb-sec{font-size:.5rem;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);font-family:var(--fm);padding:.8rem 1.5rem .3rem}
.sb-link{display:flex;align-items:center;gap:.8rem;padding:.7rem 1.5rem;font-size:.76rem;color:var(--text);cursor:pointer;transition:all .2s;border-left:2px solid transparent}
.sb-link:hover{color:var(--cream);background:rgba(79,142,247,.05)}
.sb-link.active{color:var(--cream);background:rgba(79,142,247,.08);border-left-color:var(--blue2)}
.sb-bottom{padding:1rem 1.5rem;border-top:1px solid var(--border)}
.sb-av{width:32px;height:32px;background:linear-gradient(135deg,var(--blue),var(--blue2));border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.8rem;color:#fff;font-weight:700;flex-shrink:0}
.sb-user{display:flex;align-items:center;gap:.8rem;margin-bottom:.8rem}
.sb-uname{font-size:.76rem;color:var(--cream);font-weight:500}
.sb-urole{font-size:.6rem;color:var(--muted)}
.sb-logout{width:100%;background:none;border:1px solid var(--border);color:var(--muted);padding:.5rem;font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;border-radius:4px;font-family:var(--fb);transition:all .2s}
.sb-logout:hover{border-color:var(--red);color:var(--red)}
.main{margin-left:230px;min-height:100vh;display:flex;flex-direction:column}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:1rem 2rem;border-bottom:1px solid var(--border);background:rgba(248,250,255,.96);backdrop-filter:blur(12px);position:sticky;top:0;z-index:50}
.topbar-title{font-family:var(--fs);font-size:1rem;font-weight:700;color:var(--cream)}
.tb-badge{display:flex;align-items:center;gap:.4rem;background:rgba(34,209,122,.1);border:1px solid rgba(34,209,122,.2);padding:.3rem .8rem;border-radius:20px;font-size:.6rem;color:var(--green);font-family:var(--fm)}
.tb-badge::before{content:'';width:5px;height:5px;background:var(--green);border-radius:50%;animation:gp 2s infinite}
@keyframes gp{0%,100%{box-shadow:0 0 0 0 rgba(34,209,122,.4)}50%{box-shadow:0 0 0 6px transparent}}
.content{flex:1;padding:2rem}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:1.2rem;margin-bottom:2rem}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:1.5rem;position:relative;overflow:hidden;transition:transform .2s}
.stat-card:hover{transform:translateY(-2px)}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.stat-card.blue::before{background:var(--blue2)}
.stat-card.green::before{background:var(--green)}
.stat-card.gold::before{background:var(--gold)}
.stat-card.red::before{background:var(--red)}
.sc-icon{position:absolute;top:1.2rem;right:1.2rem;font-size:1.5rem;opacity:.25}
.sc-label{font-size:.56rem;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);font-family:var(--fm);margin-bottom:.7rem;display:block}
.sc-num{font-family:var(--fs);font-size:2.2rem;font-weight:800;color:var(--blue);line-height:1;margin-bottom:.3rem}
.sc-sub{font-size:.7rem;color:var(--muted)}
.filters-row{display:flex;align-items:center;gap:.8rem;margin-bottom:1.2rem;flex-wrap:wrap}
.search-wrap{position:relative;flex:1;min-width:180px}
.search-wrap input{width:100%;background:var(--bg2);border:1px solid var(--border);padding:.65rem 1rem .65rem 2.2rem;color:var(--cream);font-size:.8rem;outline:none;border-radius:6px;font-family:var(--fb);transition:border-color .2s}
.search-wrap input:focus{border-color:rgba(79,142,247,.4)}
.search-wrap input::placeholder{color:var(--muted)}
.search-icon{position:absolute;left:.75rem;top:50%;transform:translateY(-50%);color:var(--muted);font-size:.8rem}
.filter-tabs{display:flex;gap:3px;background:rgba(79,142,247,.04);border:1px solid var(--border);border-radius:6px;padding:3px}
.ftab{background:none;border:none;padding:.38rem .85rem;font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);cursor:pointer;border-radius:4px;transition:all .2s;font-family:var(--fb)}
.ftab.active{background:rgba(79,142,247,.12);color:var(--cream);border:1px solid rgba(79,142,247,.2)}
.refresh-btn{background:none;border:1px solid var(--border);color:var(--text);padding:.6rem .9rem;border-radius:6px;cursor:pointer;font-size:.78rem;transition:all .2s}
.refresh-btn:hover{border-color:var(--blue2);color:var(--blue2)}
.table-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.t-head{display:grid;grid-template-columns:1.2fr 1.4fr .9fr 1.1fr .8fr .7fr;background:rgba(79,142,247,.04);border-bottom:1px solid var(--border)}
.th{padding:.75rem 1rem;font-size:.56rem;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);font-family:var(--fm)}
.t-body{max-height:460px;overflow-y:auto}
.tr{display:grid;grid-template-columns:1.2fr 1.4fr .9fr 1.1fr .8fr .7fr;border-bottom:1px solid rgba(79,142,247,.05);transition:background .2s;cursor:pointer}
.tr:last-child{border-bottom:none}
.tr:hover{background:rgba(79,142,247,.04)}
.td{padding:.85rem 1rem;font-size:.76rem;color:var(--text);display:flex;align-items:center;overflow:hidden}
.td-main{font-weight:500;color:var(--cream);font-size:.78rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.td-sub{font-size:.66rem;color:var(--muted);margin-top:1px}
.sbadge{display:inline-flex;align-items:center;padding:.22rem .65rem;border-radius:20px;font-size:.58rem;letter-spacing:.08em;text-transform:uppercase;font-weight:600;font-family:var(--fm)}
.sbadge.new{background:rgba(79,142,247,.12);color:var(--blue2);border:1px solid rgba(79,142,247,.2)}
.sbadge.contacted{background:rgba(232,193,112,.1);color:var(--gold);border:1px solid rgba(232,193,112,.2)}
.sbadge.converted{background:rgba(34,209,122,.1);color:var(--green);border:1px solid rgba(34,209,122,.2)}
.sbadge.lost{background:rgba(248,113,113,.1);color:var(--red);border:1px solid rgba(248,113,113,.2)}
.act-btn{background:none;border:1px solid var(--border);color:var(--muted);padding:.28rem .55rem;border-radius:4px;cursor:pointer;font-size:.64rem;transition:all .2s;margin-right:.3rem}
.act-btn:hover{border-color:var(--blue2);color:var(--blue2)}
.act-btn.del:hover{border-color:var(--red);color:var(--red)}
.empty{text-align:center;padding:4rem;color:var(--muted);font-size:.82rem}
.empty-icon{font-size:2.5rem;display:block;margin-bottom:1rem;opacity:.3}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.modal-overlay.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:2rem;width:100%;max-width:460px;position:relative;overflow:hidden}
.modal::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--blue),var(--green))}
.modal-title{font-family:var(--fs);font-size:1.15rem;color:var(--cream);margin-bottom:1.5rem;padding-right:2rem}
.modal-close{position:absolute;top:1rem;right:1rem;background:none;border:none;color:var(--muted);font-size:1.1rem;cursor:pointer;line-height:1}
.modal-close:hover{color:var(--cream)}
.mf{margin-bottom:1rem}
.mf label{display:block;font-size:.56rem;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);font-family:var(--fm);margin-bottom:.35rem}
.mf-val{font-size:.82rem;color:var(--text);line-height:1.7;padding:.55rem .8rem;background:rgba(79,142,247,.04);border:1px solid var(--border);border-radius:4px}
.mf select{width:100%;background:rgba(79,142,247,.06);border:1px solid rgba(79,142,247,.15);padding:.68rem .9rem;color:var(--cream);font-size:.8rem;outline:none;border-radius:6px;font-family:var(--fb);cursor:pointer}
.mf select option{background:var(--bg3)}
.mf textarea{width:100%;background:rgba(79,142,247,.04);border:1px solid rgba(79,142,247,.15);padding:.68rem .9rem;color:var(--cream);font-size:.8rem;outline:none;border-radius:6px;font-family:var(--fb);resize:vertical;min-height:75px}
.mf select:focus,.mf textarea:focus{border-color:rgba(79,142,247,.4)}
.modal-actions{display:flex;gap:.8rem;margin-top:1.5rem}
.modal-save{flex:1;background:linear-gradient(135deg,var(--green),var(--green2));color:#04060f;border:none;padding:.8rem;font-size:.65rem;letter-spacing:.12em;text-transform:uppercase;font-weight:700;font-family:var(--fs);border-radius:6px;cursor:pointer;transition:all .3s}
.modal-save:hover{transform:translateY(-1px);box-shadow:0 6px 18px rgba(34,209,122,.3)}
.modal-cancel{background:none;border:1px solid var(--border);color:var(--muted);padding:.8rem 1.4rem;font-size:.65rem;letter-spacing:.12em;text-transform:uppercase;font-family:var(--fs);border-radius:6px;cursor:pointer;transition:all .2s}
.modal-cancel:hover{border-color:var(--blue2);color:var(--blue2)}
.toast{position:fixed;bottom:2rem;right:2rem;background:var(--bg2);border:1px solid var(--green);color:var(--green);padding:.75rem 1.3rem;border-radius:8px;font-size:.75rem;font-family:var(--fm);z-index:999;transform:translateY(80px);opacity:0;transition:all .3s}
.toast.show{transform:translateY(0);opacity:1}
.toast.err{border-color:var(--red);color:var(--red)}
</style>
</head>
<body>

<div id="login">
  <div class="login-box">
    <div class="login-logo">TAWHID<span>.</span></div>
    <div class="login-sub">Admin Dashboard</div>
    <div class="login-err" id="loginErr">Invalid credentials. Try again.</div>
    <div class="lf">
      <label>Username</label>
      <input type="text" id="lu" value="admin" placeholder="admin"/>
      <label>Password</label>
      <input type="password" id="lp" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"/>
      <button onclick="doLogin()">Sign In →</button>
    </div>
  </div>
</div>

<div id="app">
  <aside class="sidebar">
    <div class="sb-logo">
      <div class="sb-logo-main">TAWHID<span>.</span></div>
      <div class="sb-logo-sub">Admin Panel v1.0</div>
    </div>
    <nav class="sb-nav">
      <div class="sb-sec">Main</div>
      <div class="sb-link active" id="nav-dashboard" onclick="setPage('dashboard')">📊 Dashboard</div>
      <div class="sb-link" id="nav-leads" onclick="setPage('leads')">🎯 Leads <span id="newBadge" style="margin-left:auto;background:var(--blue2);color:var(--bg);font-size:.52rem;padding:1px 6px;border-radius:10px;font-family:var(--fm)"></span></div>
      <div class="sb-sec">Tools</div>
      <div class="sb-link" onclick="window.open('http://localhost:3001/api/health')">🔗 API Health</div>
      <div class="sb-link" onclick="showToast('Coming soon!')">⚙️ Settings</div>
    </nav>
    <div class="sb-bottom">
      <div class="sb-user"><div class="sb-av">A</div><div><div class="sb-uname">Admin</div><div class="sb-urole">Tawhid Agency</div></div></div>
      <button class="sb-logout" onclick="logout()">← Logout</button>
    </div>
  </aside>

  <div class="main">
    <div class="topbar">
      <div class="topbar-title" id="pageTitle">Dashboard</div>
      <div style="display:flex;align-items:center;gap:1rem">
        <div class="tb-badge">API Online</div>
        <span style="font-size:.68rem;color:var(--muted);font-family:var(--fm)" id="clock"></span>
      </div>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>

<div class="modal-overlay" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modalInner"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const API='http://localhost:3001/api';
let TOKEN=localStorage.getItem('t_token');
let leads=[],stats={},curFilter='all',curSearch='';

setInterval(()=>{const e=document.getElementById('clock');if(e)e.textContent=new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',second:'2-digit'});},1000);

async function doLogin(){
  const u=document.getElementById('lu').value,p=document.getElementById('lp').value;
  const err=document.getElementById('loginErr');err.style.display='none';
  try{
    const r=await fetch(`${API}/admin/login`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})});
    const d=await r.json();
    if(d.token){TOKEN=d.token;localStorage.setItem('t_token',TOKEN);document.getElementById('login').style.display='none';document.getElementById('app').style.display='block';loadDash();}
    else{err.textContent='Invalid credentials';err.style.display='block';}
  }catch{err.textContent='Cannot connect to server. Is it running?';err.style.display='block';}
}

function logout(){localStorage.removeItem('t_token');TOKEN=null;document.getElementById('app').style.display='none';document.getElementById('login').style.display='flex';}

if(TOKEN){document.getElementById('login').style.display='none';document.getElementById('app').style.display='block';loadDash();}

async function fetchLeads(){
  try{
    const r=await fetch(`${API}/leads`,{headers:{Authorization:`Bearer ${TOKEN}`}});
    if(r.status===401){logout();return;}
    const d=await r.json();
    leads=d.leads||[];stats=d.stats||{};
    const nb=document.getElementById('newBadge');
    if(nb)nb.textContent=stats.new>0?stats.new:'';
  }catch{showToast('Cannot connect to API','err');}
}

function setPage(p){
  document.querySelectorAll('.sb-link').forEach(l=>l.classList.remove('active'));
  const n=document.getElementById('nav-'+p);if(n)n.classList.add('active');
  document.getElementById('pageTitle').textContent=p.charAt(0).toUpperCase()+p.slice(1);
  if(p==='dashboard')loadDash();else if(p==='leads')loadLeads();
}

async function loadDash(){
  await fetchLeads();
  const svcs={};leads.forEach(l=>{const s=l.service||'Other';svcs[s]=(svcs[s]||0)+1;});
  document.getElementById('content').innerHTML=`
    <div class="stats-row">
      <div class="stat-card blue"><span class="sc-icon">🎯</span><span class="sc-label">Total Leads</span><div class="sc-num">${stats.total||0}</div><div class="sc-sub">All time</div></div>
      <div class="stat-card blue"><span class="sc-icon">🆕</span><span class="sc-label">New</span><div class="sc-num">${stats.new||0}</div><div class="sc-sub">Need contact</div></div>
      <div class="stat-card gold"><span class="sc-icon">📞</span><span class="sc-label">Contacted</span><div class="sc-num">${stats.contacted||0}</div><div class="sc-sub">In progress</div></div>
      <div class="stat-card green"><span class="sc-icon">✅</span><span class="sc-label">Converted</span><div class="sc-num">${stats.converted||0}</div><div class="sc-sub">Closed deals</div></div>
    </div>
    <div style="display:grid;grid-template-columns:1.5fr 1fr;gap:1.5rem">
      <div>
        <div style="font-size:.6rem;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);font-family:var(--fm);margin-bottom:.8rem">Recent Leads</div>
        <div class="table-wrap">
          ${leads.slice(0,6).length?leads.slice(0,6).map(l=>`
            <div style="display:grid;grid-template-columns:1fr 1.2fr 1fr .8fr;border-bottom:1px solid rgba(79,142,247,.05);transition:background .2s;cursor:pointer" onclick="openLead('${l.id}')" onmouseenter="this.style.background='rgba(79,142,247,.04)'" onmouseleave="this.style.background=''">
              <div class="td"><div><div class="td-main">${l.name}</div><div class="td-sub">${new Date(l.createdAt).toLocaleDateString()}</div></div></div>
              <div class="td" style="overflow:hidden"><div style="font-size:.74rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)">${l.email}</div></div>
              <div class="td"><div style="font-size:.72rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${l.service||'—'}</div></div>
              <div class="td"><span class="sbadge ${l.status}">${l.status}</span></div>
            </div>
          `).join(''):'<div class="empty"><span class="empty-icon">📭</span>No leads yet</div>'}
        </div>
      </div>
      <div>
        <div style="font-size:.6rem;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);font-family:var(--fm);margin-bottom:.8rem">Services</div>
        <div class="table-wrap" style="padding:1.5rem">
          ${Object.keys(svcs).length?Object.entries(svcs).sort((a,b)=>b[1]-a[1]).map(([s,c])=>`
            <div style="display:flex;align-items:center;gap:.8rem;margin-bottom:.9rem">
              <span style="font-size:.75rem;color:var(--text);min-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1">${s}</span>
              <div style="height:5px;background:rgba(79,142,247,.12);border-radius:3px;width:80px;overflow:hidden"><div style="height:100%;background:linear-gradient(90deg,var(--blue),var(--green));width:${Math.round(c/leads.length*100)}%;border-radius:3px"></div></div>
              <span style="font-size:.68rem;color:var(--blue2);font-family:var(--fm);min-width:16px;text-align:right">${c}</span>
            </div>
          `).join(''):'<div style="color:var(--muted);font-size:.8rem;text-align:center;padding:2rem">No data yet</div>'}
        </div>
      </div>
    </div>`;
}

async function loadLeads(){
  await fetchLeads();renderLeads();
}

function renderLeads(){
  let l=[...leads];
  if(curFilter!=='all')l=l.filter(x=>x.status===curFilter);
  if(curSearch)l=l.filter(x=>x.name.toLowerCase().includes(curSearch.toLowerCase())||x.email.toLowerCase().includes(curSearch.toLowerCase())||(x.company||'').toLowerCase().includes(curSearch.toLowerCase()));
  document.getElementById('content').innerHTML=`
    <div class="filters-row">
      <div class="search-wrap"><span class="search-icon">🔍</span><input placeholder="Search name, email, company..." value="${curSearch}" oninput="curSearch=this.value;renderLeads()"/></div>
      <div class="filter-tabs">
        ${['all','new','contacted','converted','lost'].map(f=>`<button class="ftab ${curFilter===f?'active':''}" onclick="curFilter='${f}';renderLeads()">${f.charAt(0).toUpperCase()+f.slice(1)}${f==='all'?' ('+leads.length+')':f==='new'?' ('+leads.filter(x=>x.status==='new').length+')':''}</button>`).join('')}
      </div>
      <button class="refresh-btn" onclick="loadLeads()">↻</button>
    </div>
    <div class="table-wrap">
      <div class="t-head"><div class="th">Name</div><div class="th">Email</div><div class="th">Company</div><div class="th">Service</div><div class="th">Status</div><div class="th">Actions</div></div>
      <div class="t-body">
        ${l.length?l.map(x=>`
          <div class="tr" onclick="openLead('${x.id}')">
            <div class="td"><div><div class="td-main">${x.name}</div><div class="td-sub">${new Date(x.createdAt).toLocaleDateString()}</div></div></div>
            <div class="td"><div style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:150px;font-size:.74rem">${x.email}</div></div>
            <div class="td"><div style="font-size:.74rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${x.company||'—'}</div></div>
            <div class="td"><div style="font-size:.72rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${x.service||'—'}</div></div>
            <div class="td"><span class="sbadge ${x.status}">${x.status}</span></div>
            <div class="td" onclick="event.stopPropagation()"><button class="act-btn" onclick="openLead('${x.id}')">Edit</button><button class="act-btn del" onclick="delLead('${x.id}')">Del</button></div>
          </div>`).join(''):'<div class="empty"><span class="empty-icon">📭</span>No leads found</div>'}
      </div>
    </div>`;
}

function openLead(id){
  const x=leads.find(l=>l.id===id);if(!x)return;
  document.getElementById('modalInner').innerHTML=`
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-title">${x.name}</div>
    <div class="mf"><label>Email</label><div class="mf-val">${x.email}</div></div>
    <div class="mf"><label>Company</label><div class="mf-val">${x.company||'—'}</div></div>
    <div class="mf"><label>Service</label><div class="mf-val">${x.service||'—'}</div></div>
    <div class="mf"><label>Message</label><div class="mf-val" style="white-space:pre-wrap">${x.message||'—'}</div></div>
    <div class="mf"><label>Received</label><div class="mf-val">${new Date(x.createdAt).toLocaleString()}</div></div>
    <div class="mf"><label>Status</label><select id="ms">${['new','contacted','converted','lost'].map(s=>`<option value="${s}"${x.status===s?' selected':''}>${s.charAt(0).toUpperCase()+s.slice(1)}</option>`).join('')}</select></div>
    <div class="mf"><label>Notes</label><textarea id="mn" placeholder="Add notes...">${x.notes||''}</textarea></div>
    <div class="modal-actions"><button class="modal-save" onclick="saveLead('${x.id}')">Save Changes</button><button class="modal-cancel" onclick="closeModal()">Cancel</button></div>`;
  document.getElementById('modal').classList.add('open');
}

async function saveLead(id){
  const status=document.getElementById('ms').value,notes=document.getElementById('mn').value;
  await fetch(`${API}/leads/${id}`,{method:'PATCH',headers:{'Content-Type':'application/json',Authorization:`Bearer ${TOKEN}`},body:JSON.stringify({status,notes})});
  closeModal();await fetchLeads();renderLeads();showToast('Lead updated ✓');
}

async function delLead(id){
  if(!confirm('Delete this lead?'))return;
  await fetch(`${API}/leads/${id}`,{method:'DELETE',headers:{Authorization:`Bearer ${TOKEN}`}});
  await fetchLeads();renderLeads();showToast('Deleted','err');
}

function closeModal(){document.getElementById('modal').classList.remove('open');}

function showToast(msg,type=''){
  const t=document.getElementById('toast');t.textContent=msg;t.className=`toast ${type}`;
  setTimeout(()=>t.classList.add('show'),10);
  setTimeout(()=>t.classList.remove('show'),3000);
}
</script>
</body>
</html>
